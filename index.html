<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProjectFlow Pro</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main id="authWall" class="auth-wall"></main>
  <div id="appShell" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand"><span class="mark">PF</span><div><strong>ProjectFlow</strong><small>Project OS</small></div></div>
      <nav id="nav"></nav>
      <div class="connection-card" id="connectionCard"></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Project operating system</p>
          <h1 id="pageTitle">Pilotage</h1>
        </div>
        <div class="top-actions">
          <select id="projectSwitcher" title="Projet actif"></select>
          <button id="exportBtn" class="ghost">Exporter CSV</button>
          <button id="logoutBtn" class="danger ghost">Déconnexion</button>
        </div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
